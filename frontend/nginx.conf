# =============================================================================
# Nginx Configuration — React SPA with API Reverse Proxy
# =============================================================================
# Serves the Vite-built React app and handles client-side routing by
# falling back to index.html for all non-file requests.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # ── Static Assets (cached aggressively) ──────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA Fallback ─────────────────────────────────────────────────────
    # For any route that doesn't match a physical file, serve index.html.
    # This allows React Router to handle client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health Check Endpoint ────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
